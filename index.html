<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パーソナルカラー診断　合成画像生成ツール</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    padding:20px;
}

.controls{
    max-width:500px;
    margin:20px auto;
    text-align:left;
}

label{
    display:block;
    margin-top:15px;
}

input[type=range]{
    width:100%;
}

.buttons{
    margin:20px 0;
}

button{
    padding:14px 24px;
    margin:8px;
    font-size:16px;
    cursor:pointer;
}

.preview-area{
    display:flex;
    flex-direction:column;
    gap:40px;
    margin-top:30px;
}

.preview{
    width:900px;
    max-width:100%;
    margin:auto;
}

canvas{
    width:900px;
    max-width:100%;
    height:auto;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>人物画像を選択</h2>

<input type="file" id="upload" accept="image/*">

<div class="controls">
    <label>拡大・縮小</label>
    <input type="range" id="scale" min="0.5" max="3" step="0.01" value="1">

    <label>左右位置</label>
    <input type="range" id="offsetX" min="-500" max="500" step="1" value="0">

    <label>上下位置</label>
    <input type="range" id="offsetY" min="-500" max="500" step="1" value="0">
</div>

<div class="buttons">
    <button onclick="downloadAll()">11枚すべてダウンロード</button>
    <button onclick="downloadMawashi()">回し4枚ダウンロード</button>
</div>

<div id="previewArea" class="preview-area"></div>

<script>

const templates = [
    "基本1",
    "基本2",
    "基本3-1",
    "基本3-2",
    "基本4",
    "基本5",
    "基本6",
    "イエベ回し3枚バージョン",
    "ブルベ回し3枚バージョン",
    "イエベ回し4枚バージョン",
    "ブルベ回し4枚バージョン"
];

const mawashiTemplates = [
    "イエベ回し3枚バージョン",
    "ブルベ回し3枚バージョン",
    "イエベ回し4枚バージョン",
    "ブルベ回し4枚バージョン"
];

let personImg = null;
let overlayImages = {};

const upload = document.getElementById("upload");
const scaleInput = document.getElementById("scale");
const offsetXInput = document.getElementById("offsetX");
const offsetYInput = document.getElementById("offsetY");
const previewArea = document.getElementById("previewArea");

upload.addEventListener("change", async function(e){

    const file = e.target.files[0];
    if(!file) return;

    personImg = await loadImage(URL.createObjectURL(file));

    overlayImages = {};

    for(const name of templates){
        overlayImages[name] = await loadImage(name + ".png");
    }

    createCanvases();
    renderAll();

});

scaleInput.addEventListener("input", renderAll);
offsetXInput.addEventListener("input", renderAll);
offsetYInput.addEventListener("input", renderAll);

function loadImage(src){

    return new Promise((resolve,reject)=>{

        const img = new Image();

        img.onload = ()=>resolve(img);

        img.onerror = ()=>{
            alert("画像を読み込めません：" + src);
            reject();
        };

        img.src = src;

    });

}

function createCanvases(){

    previewArea.innerHTML = "";

    templates.forEach((name, index)=>{

        const div = document.createElement("div");
        div.className = "preview";

        const title = document.createElement("h3");
        title.textContent = name;

        const canvas = document.createElement("canvas");
        canvas.width = 900;
        canvas.height = 1200;
        canvas.id = "canvas_" + index;

        div.appendChild(title);
        div.appendChild(canvas);

        previewArea.appendChild(div);

    });

}

function renderAll(){

    if(!personImg) return;

    templates.forEach((name, index)=>{

        const canvas = document.getElementById("canvas_" + index);
        const overlay = overlayImages[name];

        if(canvas && overlay){
            createImage(canvas, overlay);
        }

    });

}

function createImage(canvas, overlay){

    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,900,1200);

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0,0,900,1200);

    const positions = [
        [0,0],
        [450,0],
        [0,600],
        [450,600]
    ];

    positions.forEach(pos=>{

        drawCover(
            ctx,
            personImg,
            pos[0],
            pos[1],
            450,
            600
        );

    });

    ctx.drawImage(
        overlay,
        0,
        0,
        900,
        1200
    );

}

function drawCover(ctx,img,x,y,w,h){

    const scale = Number(scaleInput.value);
    const offsetX = Number(offsetXInput.value);
    const offsetY = Number(offsetYInput.value);

    const imgRatio = img.width / img.height;
    const boxRatio = w / h;

    let baseW;
    let baseH;

    if(imgRatio > boxRatio){
        baseH = h;
        baseW = h * imgRatio;
    }else{
        baseW = w;
        baseH = w / imgRatio;
    }

    const drawW = baseW * scale;
    const drawH = baseH * scale;

    const drawX =
        x +
        ((w - drawW) / 2) +
        offsetX;

    const drawY =
        y +
        ((h - drawH) / 2) +
        offsetY;

    ctx.save();

    ctx.beginPath();
    ctx.rect(x,y,w,h);
    ctx.clip();

    ctx.drawImage(
        img,
        drawX,
        drawY,
        drawW,
        drawH
    );

    ctx.restore();

}

async function downloadAll(){
    await downloadMultiple(templates);
}

async function downloadMawashi(){
    await downloadMultiple(mawashiTemplates);
}

async function downloadMultiple(targetTemplates){

    if(!personImg){
        alert("先に人物画像を選択してください");
        return;
    }

    for(const name of targetTemplates){

        const index = templates.indexOf(name);
        const canvas = document.getElementById("canvas_" + index);

        if(!canvas) continue;

        await downloadCanvas(canvas, name + ".png");

        await wait(700);
    }

}

function downloadCanvas(canvas, filename){

    return new Promise((resolve,reject)=>{

        canvas.toBlob(function(blob){

            if(!blob){
                alert("画像生成に失敗しました");
                reject();
                return;
            }

            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = filename;

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            setTimeout(()=>{
                URL.revokeObjectURL(url);
                resolve();
            },300);

        },"image/png");

    });

}

function wait(ms){
    return new Promise(resolve=>setTimeout(resolve, ms));
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4分割画像生成</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}

button{
  padding:12px 20px;
  font-size:16px;
  margin-top:10px;
}

.result{
  margin-top:20px;
}

a{
  display:block;
  margin:10px 0;
  font-size:18px;
}
</style>
</head>
<body>

<h2>4分割画像生成</h2>

<input type="file" id="photo" accept="image/*">

<br>

<button onclick="generate()">生成</button>

<div class="result" id="result"></div>
<script>

const CANVAS_W = 900;
const CANVAS_H = 1200;

function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function generate(){

  const file =
    document.getElementById("photo").files[0];

  if(!file){
    alert("画像を選択してください");
    return;
  }

  try{

    const userImg =
      await loadImage(
        URL.createObjectURL(file)
      );

    const frame1 =
      await loadImage("A01.png");

    const frame2 =
      await loadImage("A02.png");

    const out1 =
      await createImage(userImg,frame1);

    const out2 =
      await createImage(userImg,frame2);

    document.getElementById("result").innerHTML = `
      <a download="result_A01.png" href="${out1}">
        画像①を保存
      </a>

      <a download="result_A02.png" href="${out2}">
        画像②を保存
      </a>
    `;

  }catch(e){

    console.error(e);
    alert("エラーが発生しました");

  }
}

async function createImage(userImg,frame){

  const canvas =
    document.createElement("canvas");

  canvas.width = 900;
  canvas.height = 1200;

  const ctx =
    canvas.getContext("2d");

  ctx.drawImage(
    userImg,
    0,
    0,
    900,
    1200
  );

  return canvas.toDataURL("image/png");
}

</script>
